- id: atelier-7
  name: fix-course-correct-exit-code
  priority: P1
  status: done
  completed: 2026-04-05
  title: Fix pre-tool-course-correct.nu deny exit code protocol
  description: |
    Root cause found and resolved: load_rules was double-parsing JSON (open + from json),
    so rules never matched. Fixed to use open only. Deny signal: exit 2 + stderr is correct
    — Claude Code shows "hook blocking error" for all hook-driven blocks regardless of JSON.
    permissionDecision deny + exit 0 is not honored by Claude Code. Accepted behavior.
  files:
  - /Users/joe/.claude/hooks/nu/pre/pre-tool-course-correct.nu
- id: atelier-8
  name: extract-coursers-repo
  priority: P1
  status: done
  completed: 2026-04-05
  title: Extract course-correction pipeline into standalone coursers repo
  description: |
    Extracted pre-tool-course-correct and post-tool-track-failures logic from nu scripts
    into a standalone Rust binary (coursers). Binary owns all rule-matching and failure-
    tracking logic; nu hooks become thin one-liners: `echo $raw | ^coursers pre/post`.
    Committed and pushed to https://github.com/89jobrien/coursers. obfsck allowlist updated
    to include the coursers GitHub URL. Global pre-commit hook updated to exclude Cargo.lock.
  files:
  - /Users/joe/dev/coursers/src/main.rs
  - /Users/joe/dev/coursers/src/rules.rs
  - /Users/joe/dev/coursers/src/state.rs
  - /Users/joe/.claude/hooks/nu/pre/pre-tool-course-correct.nu
  - /Users/joe/.claude/hooks/nu/post/post-tool-track-failures.nu
  - /Users/joe/.config/git/hooks/pre-commit
  - /Users/joe/.config/obfsck/allowlist

