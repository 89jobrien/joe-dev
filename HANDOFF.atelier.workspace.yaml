- id: atelier-7
  name: fix-course-correct-exit-code
  priority: P1
  status: open
  title: Fix pre-tool-course-correct.nu deny exit code protocol
  description: |
    Root cause of recurring "PreToolUse:Bash hook error": deny() was calling exit 2 and
    writing JSON to stderr. Claude Code treats any non-zero hook exit as a hook error.
    Fix applied this session: deny() now writes JSON to stdout and exits 0.
    Still needs validation in a fresh session — confirm no more hook errors on Bash calls,
    and that deny decisions (e.g. grep without pipe) still block correctly.
  files:
  - /Users/joe/.claude/hooks/nu/pre/pre-tool-course-correct.nu

